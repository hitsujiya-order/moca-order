<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOCA 管理画面</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #111;
      color: #fff;
      padding: 16px 14px;
      border-bottom: 1px solid #222;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    header p {
      margin: 6px 0 0;
      font-size: 13px;
      color: #ccc;
    }

    .top-bar {
      position: sticky;
      top: 69px;
      z-index: 99;
      background: #fff;
      padding: 12px;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }

    .top-bar button {
      border: 1px solid #ccc;
      background: #fff;
      color: #111;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }

    .top-bar button.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 12px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
    }

    .summary-card {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 12px;
    }

    .summary-card .label {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .summary-card .value {
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 12px;
    }

    .order-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .order-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .order-head h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.4;
    }

    .meta {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0 10px;
    }

    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      color: #fff;
    }

    .badge-normal { background: #111; }
    .badge-gift { background: #8a2be2; }
    .badge-support { background: #d97706; }
    .badge-done { background: #16a34a; }
    .badge-pending { background: #dc2626; }

    .detail-box {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 10px;
      margin-top: 10px;
    }

    .detail-line {
      font-size: 13px;
      color: #444;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .actions button {
      flex: 1;
      min-width: 120px;
      border: none;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-done {
      background: #111;
      color: #fff;
    }

    .btn-delete {
      background: #eee;
      color: #111;
    }

    .empty {
      background: #fff;
      border: 1px dashed #ccc;
      color: #666;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
    }

    .history-section {
      margin-top: 20px;
      padding-top: 8px;
    }

    .loading {
      background: #fff;
      border: 1px dashed #ccc;
      color: #666;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>MOCA 管理画面</h1>
    <p>通常注文・奢り・スタッフ応援を一覧で確認できます</p>
  </header>

  <div class="top-bar">
    <button class="active" onclick="setFilter('all', this)">すべて</button>
    <button onclick="setFilter('normal', this)">通常注文</button>
    <button onclick="setFilter('gift', this)">奢り注文</button>
    <button onclick="setFilter('staff_support', this)">スタッフ応援</button>
    <button onclick="setFilter('pending', this)">未提供のみ</button>
    <button onclick="setFilter('done', this)">提供済み</button>
  </div>

  <div class="summary">
    <div class="summary-card">
      <div class="label">未提供</div>
      <div class="value" id="pendingCount">0</div>
    </div>
    <div class="summary-card">
      <div class="label">提供済み</div>
      <div class="value" id="doneCount">0</div>
    </div>
    <div class="summary-card">
      <div class="label">奢り注文</div>
      <div class="value" id="giftCount">0</div>
    </div>
    <div class="summary-card">
      <div class="label">スタッフ応援</div>
      <div class="value" id="supportCount">0</div>
    </div>
  </div>

  <div class="container">
    <div id="ordersArea" class="loading">読み込み中...</div>

    <div class="history-section">
      <h2 style="font-size:18px; margin: 0 0 10px;">注文履歴</h2>
      <div id="historyArea" class="loading">読み込み中...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ztmuvqipzlnmtsbbtuyh.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_WI0CrS5TGxfQjmjTFtUHmA_Xa5Ey4j5";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentFilter = "all";
    let allOrders = [];

    function typeLabel(type) {
      if (type === "gift") return "奢り注文";
      if (type === "staff_support") return "スタッフ応援";
      return "通常注文";
    }

    function typeBadgeClass(type) {
      if (type === "gift") return "badge-gift";
      if (type === "staff_support") return "badge-support";
      return "badge-normal";
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll(".top-bar button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    }

    function getFilteredOrders() {
      if (currentFilter === "all") return allOrders.filter(order => order.status !== "done");
      if (currentFilter === "pending") return allOrders.filter(order => order.status === "pending");
      if (currentFilter === "done") return allOrders.filter(order => order.status === "done");
      return allOrders.filter(order => order.order_type === currentFilter && order.status !== "done");
    }

    function renderSummary() {
      document.getElementById("pendingCount").textContent = allOrders.filter(o => o.status !== "done").length;
      document.getElementById("doneCount").textContent = allOrders.filter(o => o.status === "done").length;
      document.getElementById("giftCount").textContent = allOrders.filter(o => o.order_type === "gift").length;
      document.getElementById("supportCount").textContent = allOrders.filter(o => o.order_type === "staff_support").length;
    }

    function renderOrders() {
      const ordersArea = document.getElementById("ordersArea");
      const filtered = getFilteredOrders();

      if (filtered.length === 0) {
        ordersArea.innerHTML = `<div class="empty">表示する注文はありません</div>`;
        return;
      }

      let html = "";

      filtered.forEach(order => {
        html += `
          <div class="order-card">
            <div class="order-head">
              <div>
                <h3>${escapeHtml(order.item_name)}</h3>
                <div class="meta">
                  注文時刻: ${formatDate(order.created_at)}<br>
                  注文元: Table ${escapeHtml(order.from_table || "-")}
                </div>
              </div>
              <div style="text-align:right;">
                <div style="font-size:18px; font-weight:bold;">¥${Number(order.subtotal || 0).toLocaleString()}</div>
              </div>
            </div>

            <div class="badge-row">
              <span class="badge ${typeBadgeClass(order.order_type)}">${typeLabel(order.order_type)}</span>
              <span class="badge ${order.status === "done" ? "badge-done" : "badge-pending"}">${order.status === "done" ? "提供済み" : "未提供"}</span>
            </div>

            <div class="detail-box">
              <div class="detail-line">数量: ${order.quantity}</div>
              ${order.mix ? `<div class="detail-line">割り方: ${escapeHtml(order.mix)}</div>` : ""}
              ${order.order_type === "normal" ? `<div class="detail-line">届け先: Table ${escapeHtml(order.target_table || "-")}</div>` : ""}
              ${order.order_type === "gift" ? `<div class="detail-line">届け先: Table ${escapeHtml(order.target_table || "-")}（Table ${escapeHtml(order.from_table || "-")} からの奢り）</div>` : ""}
              ${order.order_type === "staff_support" ? `<div class="detail-line">区分: スタッフ応援</div>` : ""}
              ${order.order_type === "staff_support" && order.support_message ? `<div class="detail-line">メッセージ: ${escapeHtml(order.support_message)}</div>` : ""}
            </div>

            <div class="actions">
              <button class="btn-done" onclick="toggleDone('${order.id}', '${order.status}')">
                ${order.status === "done" ? "未提供に戻す" : "提供済みにする"}
              </button>
              <button class="btn-delete" onclick="deleteOrder('${order.id}')">削除</button>
            </div>
          </div>
        `;
      });

      ordersArea.innerHTML = html;
    }

    function renderHistory() {
      const historyArea = document.getElementById("historyArea");
      const doneOrders = allOrders.filter(order => order.status === "done");

      if (doneOrders.length === 0) {
        historyArea.innerHTML = `<div class="empty">履歴はまだありません</div>`;
        return;
      }

      let html = "";
      doneOrders.forEach(order => {
        html += `
          <div class="order-card">
            <div class="order-head">
              <div>
                <h3>${escapeHtml(order.item_name)}</h3>
                <div class="meta">
                  注文時刻: ${formatDate(order.created_at)}<br>
                  注文元: Table ${escapeHtml(order.from_table || "-")}
                </div>
              </div>
              <div style="text-align:right;">
                <div style="font-size:18px; font-weight:bold;">¥${Number(order.subtotal || 0).toLocaleString()}</div>
              </div>
            </div>

            <div class="badge-row">
              <span class="badge ${typeBadgeClass(order.order_type)}">${typeLabel(order.order_type)}</span>
              <span class="badge badge-done">提供済み履歴</span>
            </div>

            <div class="detail-box">
              <div class="detail-line">数量: ${order.quantity}</div>
              ${order.mix ? `<div class="detail-line">割り方: ${escapeHtml(order.mix)}</div>` : ""}
              ${order.order_type === "normal" ? `<div class="detail-line">届け先: Table ${escapeHtml(order.target_table || "-")}</div>` : ""}
              ${order.order_type === "gift" ? `<div class="detail-line">届け先: Table ${escapeHtml(order.target_table || "-")}（Table ${escapeHtml(order.from_table || "-")} からの奢り）</div>` : ""}
              ${order.order_type === "staff_support" ? `<div class="detail-line">区分: スタッフ応援</div>` : ""}
              ${order.order_type === "staff_support" && order.support_message ? `<div class="detail-line">メッセージ: ${escapeHtml(order.support_message)}</div>` : ""}
            </div>
          </div>
        `;
      });

      historyArea.innerHTML = html;
    }

    async function fetchOrders() {
      const { data, error } = await supabaseClient
        .from("orders")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        document.getElementById("ordersArea").innerHTML = `<div class="empty">注文の取得に失敗しました</div>`;
        document.getElementById("historyArea").innerHTML = `<div class="empty">履歴の取得に失敗しました</div>`;
        return;
      }

      allOrders = data || [];
      render();
    }

    async function toggleDone(id, currentStatus) {
      const newStatus = currentStatus === "done" ? "pending" : "done";

      const { error } = await supabaseClient
        .from("orders")
        .update({ status: newStatus })
        .eq("id", id);

      if (error) {
        console.error(error);
        alert("状態更新に失敗しました");
        return;
      }

      await fetchOrders();
    }

    async function deleteOrder(id) {
      const ok = confirm("この注文を削除しますか？");
      if (!ok) return;

      const { error } = await supabaseClient
        .from("orders")
        .delete()
        .eq("id", id);

      if (error) {
        console.error(error);
        alert("削除に失敗しました");
        return;
      }

      await fetchOrders();
    }

    function render() {
      renderSummary();
      renderOrders();
      renderHistory();
    }

    function formatDate(value) {
      try {
        return new Date(value).toLocaleString("ja-JP");
      } catch {
        return value;
      }
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    fetchOrders();
  </script>
</body>
</html>
