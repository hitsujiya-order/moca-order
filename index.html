  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #111;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 14px 12px 10px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }
    header p {
      margin: 6px 0 0;
      color: #666;
      font-size: 14px;
    }
    .table-banner {
      margin-top: 10px;
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
    }
    .top-buttons {
      display: flex;
      gap: 10px;
      padding: 12px;
      background: #fff;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 98px;
      z-index: 99;
    }
    .top-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .category-bar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 12px;
      background: #fff;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 160px;
      z-index: 98;
    }
    .category-bar button {
      white-space: nowrap;
      border: 1px solid #ccc;
      background: #fff;
      color: #111;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .category-bar button.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .container { padding: 14px; }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    .card {
      position: relative;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 12px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      cursor: pointer;
      overflow: hidden;
    }
    .card img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 12px;
      background: #f4f4f4;
    }
    .card h3 {
      font-size: 17px;
      margin: 12px 0 6px;
      line-height: 1.3;
    }
    .desc {
      font-size: 12px;
      color: #666;
      min-height: 34px;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .price {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .card button {
      width: 100%;
      padding: 10px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
    .soldout-card { opacity: 0.55; }
    .soldout-card button {
      background: #999;
      cursor: not-allowed;
    }
    .badge-wrap {
      position: absolute;
      top: 18px;
      left: 18px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      z-index: 2;
    }
    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      color: #fff;
    }
    .badge-recommend { background: #111; }
    .badge-popular { background: #c40000; }
    .badge-limited { background: #a05a00; }
    .badge-soldout { background: #666; }

    .empty-food, .support-box {
      padding: 20px;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      background: #fafafa;
      line-height: 1.6;
      color: #444;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .modal {
      width: 100%;
      max-width: 430px;
      max-height: 88vh;
      overflow-y: auto;
      background: #fff;
      color: #111;
      border-radius: 18px;
      padding: 18px;
    }
    .modal h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    .modal p {
      color: #555;
      line-height: 1.5;
      margin-top: 0;
    }

    .option-title {
      font-weight: bold;
      margin-bottom: 8px;
      display: block;
    }
    .option-group label {
      display: block;
      margin: 8px 0;
      font-size: 15px;
    }
    .qty-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0;
    }
    .qty-row button {
      width: 38px;
      height: 38px;
      border: 1px solid #ccc;
      background: #fff;
      color: #111;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }
    .qty-number {
      min-width: 30px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }

      background: #111;
      color: #fff;
    }
    .btn-sub {
      background: #eee;
      color: #111;
    }

      border-bottom: 1px solid #eee;
      padding: 10px 0;
    }
    .cart-item:last-child, .history-item:last-child, .confirm-item:last-child {
      border-bottom: none;
    }
    .small-text {
      color: #666;
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.5;
    }
    .total-box {
      margin: 16px 0;
      font-size: 18px;
      font-weight: bold;

      border-radius: 10px;
      background: #fff;
      font-size: 15px;

<body>
  <header>
    <h1>MOCA ORDER</h1>
    <p>モバイルオーダー</p>
    <div class="table-banner" id="tableBanner">Table 1</div>
  </header>

  <div class="top-buttons">
    <button onclick="openCart()">カート</button>
    <button onclick="openHistory()">注文履歴</button>
  </div>

  <div class="category-bar" id="categoryBar"></div>

  <div class="container">
    <div id="menuArea"></div>
  </div>

  <div class="modal-bg" id="itemModalBg">
    <div class="modal">
      <h2 id="modalTitle"></h2>
      <p id="modalDesc"></p>
      <div class="price" id="modalPrice"></div>

      <div class="option-group" id="drinkOptions">
        <span class="option-title">割り方を選択</span>
        <label><input type="radio" name="mix" value="ロック" checked> ロック</label>
        <label><input type="radio" name="mix" value="ソーダ"> ソーダ</label>
        <label><input type="radio" name="mix" value="水割り"> 水割り</label>
      </div>

      <div class="option-group" id="giftModeWrap">
        <span class="option-title">注文先</span>
        <label><input type="radio" name="giftMode" value="self" checked onchange="toggleGiftTarget()"> 自分のテーブル用</label>
        <label><input type="radio" name="giftMode" value="gift" onchange="toggleGiftTarget()"> 別テーブルに奢る</label>
      </div>

      <div class="option-group" id="giftTargetWrap" style="display:none;">
        <span class="option-title">送り先テーブル</span>
        <select id="giftTarget"></select>
      </div>

      <div class="option-group" id="messageWrap" style="display:none;">
        <span class="option-title">メッセージ</span>
        <textarea id="supportMessage" placeholder="例：接客とても良かったです！"></textarea>
      </div>

      <div class="qty-row">
        <button onclick="changeQty(-1)">−</button>
        <div class="qty-number" id="qtyNumber">1</div>
        <button onclick="changeQty(1)">＋</button>
      </div>

      <div class="modal-actions">
        <button class="btn-sub" onclick="closeItemModal()">閉じる</button>
        <button class="btn-main" onclick="addToCart()">カートに追加</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="cartModalBg">
    <div class="modal">
      <h2>カート</h2>
      <div id="cartItems"></div>
      <div class="total-box" id="cartTotal">合計：¥0</div>
      <div class="modal-actions">
        <button class="btn-sub" onclick="closeCart()">閉じる</button>
        <button class="btn-main" onclick="openConfirmOrder()">注文へ進む</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="confirmModalBg">
    <div class="modal">
      <h2>注文確認</h2>
      <div id="confirmItems"></div>
      <div class="total-box" id="confirmTotal">合計：¥0</div>
      <div class="modal-actions">
        <button class="btn-sub" onclick="closeConfirmModal()">戻る</button>
        <button class="btn-main" onclick="placeOrder()">この内容で注文する</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="historyModalBg">
    <div class="modal">
      <h2>注文履歴</h2>
      <div id="historyItems"></div>
      <div class="modal-actions">
        <button class="btn-main" onclick="closeHistory()">閉じる</button>
      </div>
    </div>
  </div>

      { category: "NON ALCOHOL & SOFT DRINK", name: "コーヒーフロート", price: 700, desc: "フロート", image: "https://images.unsplash.com/photo-1542444592-0d7230d24b18" },
      { category: "NON ALCOHOL & SOFT DRINK", name: "ノンアルコールビール", price: 700, desc: "キリン零ICHI", image: "https://images.unsplash.com/photo-1563379091339-03246963d29c" },

      { category: "STAFF SUPPORT", name: "スタッフ応援ドリンク ￥300", price: 300, desc: "スタッフへの応援（投げ銭）です", recommend: true, support: true, image: "https://images.unsplash.com/photo-1556740749-887f6717d7e4" },
      { category: "STAFF SUPPORT", name: "スタッフ応援ドリンク ￥500", price: 500, desc: "スタッフへの応援（投げ銭）です", support: true, popular: true, image: "https://images.unsplash.com/photo-1556740749-887f6717d7e4" },
      { category: "STAFF SUPPORT", name: "スタッフ応援ドリンク ￥1,000", price: 1000, desc: "スタッフへの応援（投げ銭）です", support: true, image: "https://images.unsplash.com/photo-1556740749-887f6717d7e4" }
    ];

    let currentCategory = "BEER";
    let selectedItem = null;
    let quantity = 1;
    let cart = JSON.parse(localStorage.getItem("mocaCart")) || [];
    let loadingHistory = false;

    function setupGiftTableOptions() {
      const select = document.getElementById("giftTarget");
      select.innerHTML = "";
      tableOptions.forEach(num => {
        if (num !== tableNumber) {
          const option = document.createElement("option");
          option.value = num;
          option.textContent = "Table " + num;
          select.appendChild(option);
        }
      });
    }

    function renderCategories() {
      const bar = document.getElementById("categoryBar");
      bar.innerHTML = "";
      categories.forEach(category => {
        const btn = document.createElement("button");
        btn.textContent = category;
        if (category === currentCategory) btn.classList.add("active");
        btn.onclick = () => {
          currentCategory = category;
          renderCategories();
          renderMenu();
        };
        bar.appendChild(btn);
      });
    }

    function getBadges(item) {
      let html = "";
      if (item.recommend) html += `<span class="badge badge-recommend">おすすめ</span>`;
      if (item.popular) html += `<span class="badge badge-popular">人気</span>`;
      if (item.limited) html += `<span class="badge badge-limited">限定</span>`;
      if (item.soldOut) html += `<span class="badge badge-soldout">SOLD OUT</span>`;
      return html;
    }

    function renderMenu() {
      const menuArea = document.getElementById("menuArea");

      if (currentCategory === "FOOD") {
        menuArea.innerHTML = `<div class="empty-food">FOODは準備中です</div>`;
        return;
      }

      if (currentCategory === "STAFF SUPPORT") {
        const supportCards = items.filter(item => item.category === "STAFF SUPPORT");
        let html = `
          <div class="support-box">
            「今日の接客、良かった！」「カクテルが美味しかった！」と思っていただけたら、スタッフへ応援（投げ銭）をいただけると励みになります。いただいたチップは全額、スタッフの研修や福利厚生に活用させていただきます。
          </div>
          <div style="height:14px;"></div>
          <div class="menu-grid">
        `;
        supportCards.forEach(item => {
          const idx = items.indexOf(item);
          html += `
            <div class="card" onclick="openItemModal(${idx})">
              <div class="badge-wrap">${getBadges(item)}</div>
              <img src="${item.image}" alt="${item.name}">
              <h3>${item.name}</h3>
              <div class="desc">${item.desc}</div>
              <div class="price">¥${item.price.toLocaleString()}</div>
              <button type="button">選択する</button>
            </div>
          `;
        });
        html += `</div>`;
        menuArea.innerHTML = html;
        return;
      }

      const filtered = items.filter(item => item.category === currentCategory);

      let html = `<div class="menu-grid">`;
      filtered.forEach(item => {
        const idx = items.indexOf(item);
        html += `
          <div class="card ${item.soldOut ? 'soldout-card' : ''}" onclick="${item.soldOut ? '' : `openItemModal(${idx})`}">
            <div class="badge-wrap">${getBadges(item)}</div>
            <img src="${item.image}" alt="${item.name}">
            <h3>${item.name}</h3>
            <div class="desc">${item.desc}</div>
            <div class="price">¥${item.price.toLocaleString()}</div>
            <button type="button" ${item.soldOut ? 'disabled' : ''}>${item.soldOut ? '売り切れ' : '選択する'}</button>
          </div>
        `;
      });
      html += `</div>`;
      menuArea.innerHTML = html;
    }

    function shouldShowMixOptions(item) {
      return !["BEER", "NON ALCOHOL & SOFT DRINK", "STAFF SUPPORT"].includes(item.category);
    }

    function openItemModal(index) {
      selectedItem = items[index];
      quantity = 1;
      document.getElementById("qtyNumber").textContent = quantity;
      document.getElementById("modalTitle").textContent = selectedItem.name;
      document.getElementById("modalDesc").textContent = selectedItem.desc;
      document.getElementById("modalPrice").textContent = "¥" + selectedItem.price.toLocaleString();

      document.getElementById("drinkOptions").style.display = shouldShowMixOptions(selectedItem) ? "block" : "none";
      document.getElementById("giftModeWrap").style.display = selectedItem.support ? "none" : "block";
      document.getElementById("giftTargetWrap").style.display = "none";
      document.getElementById("messageWrap").style.display = selectedItem.support ? "block" : "none";

      const mixRadio = document.querySelector('input[name="mix"][value="ロック"]');
      if (mixRadio) mixRadio.checked = true;

      const giftSelf = document.querySelector('input[name="giftMode"][value="self"]');
      if (giftSelf) giftSelf.checked = true;

      document.getElementById("supportMessage").value = "";
      document.getElementById("itemModalBg").style.display = "flex";
    }

    function closeItemModal() {
      document.getElementById("itemModalBg").style.display = "none";
    }

    function toggleGiftTarget() {
      const mode = document.querySelector('input[name="giftMode"]:checked')?.value || "self";
      document.getElementById("giftTargetWrap").style.display = mode === "gift" ? "block" : "none";
    }

    function changeQty(num) {
      quantity += num;
      if (quantity < 1) quantity = 1;
      document.getElementById("qtyNumber").textContent = quantity;
    }

    function addToCart() {
      const mix = shouldShowMixOptions(selectedItem)
        ? (document.querySelector('input[name="mix"]:checked')?.value || "")
        : "";

      const supportMessage = selectedItem.support
        ? document.getElementById("supportMessage").value.trim()
        : "";

      const giftMode = selectedItem.support
        ? "staff"
        : (document.querySelector('input[name="giftMode"]:checked')?.value || "self");

      const targetTable = giftMode === "gift"
        ? document.getElementById("giftTarget").value
        : tableNumber;

      const orderType =
        selectedItem.support ? "staff_support" :
        giftMode === "gift" ? "gift" :
        "normal";

      cart.push({
        name: selectedItem.name,
        category: selectedItem.category,
        price: selectedItem.price,
        desc: selectedItem.desc,
        mix,
        quantity,
        subtotal: selectedItem.price * quantity,
        fromTable: tableNumber,
        targetTable,
        isGift: giftMode === "gift",
        support: selectedItem.support || false,
        supportMessage,
        orderType
      });

      localStorage.setItem("mocaCart", JSON.stringify(cart));
      closeItemModal();
      alert(selectedItem.support ? "スタッフ応援をカートに追加しました" : "カートに追加しました");
    }

    function openCart() {
      const cartItems = document.getElementById("cartItems");

      if (cart.length === 0) {
        cartItems.innerHTML = `<p>カートは空です</p>`;
        document.getElementById("cartTotal").textContent = "合計：¥0";
      } else {
        let html = "";
        let total = 0;

        cart.forEach(item => {
          total += item.subtotal;
          html += `<div class="cart-item"><strong>${item.name}</strong>`;

          if (item.mix) html += `<div class="small-text">割り方：${item.mix}</div>`;
          html += `<div class="small-text">数量：${item.quantity}</div>`;

          if (item.orderType === "gift") {
            html += `<div class="small-text">届け先：Table ${item.targetTable}（Table ${item.fromTable} からの奢り）</div>`;
          } else if (item.orderType === "staff_support") {
            html += `<div class="small-text">区分：スタッフ応援</div>`;
            if (item.supportMessage) html += `<div class="small-text">メッセージ：${escapeHtml(item.supportMessage)}</div>`;
          } else {
            html += `<div class="small-text">届け先：Table ${item.targetTable}</div>`;
          }

          html += `<div class="small-text">小計：¥${item.subtotal.toLocaleString()}</div></div>`;
        });

        cartItems.innerHTML = html;
        document.getElementById("cartTotal").textContent = "合計：¥" + total.toLocaleString();
      }

      document.getElementById("cartModalBg").style.display = "flex";
    }

    function closeCart() {
      document.getElementById("cartModalBg").style.display = "none";
    }

    function openConfirmOrder() {
      if (cart.length === 0) {
        alert("カートが空です");
        return;
      }

      let html = "";
      let total = 0;

      cart.forEach(item => {
        total += item.subtotal;
        html += `<div class="confirm-item"><strong>${item.name}</strong>`;
        if (item.mix) html += `<div class="small-text">割り方：${item.mix}</div>`;
        html += `<div class="small-text">数量：${item.quantity}</div>`;

        if (item.orderType === "gift") {
          html += `<div class="small-text">届け先：Table ${item.targetTable}（Table ${item.fromTable} からの奢り）</div>`;
        } else if (item.orderType === "staff_support") {
          html += `<div class="small-text">区分：スタッフ応援</div>`;
          if (item.supportMessage) html += `<div class="small-text">メッセージ：${escapeHtml(item.supportMessage)}</div>`;
        } else {
          html += `<div class="small-text">届け先：Table ${item.targetTable}</div>`;
        }

        html += `<div class="small-text">小計：¥${item.subtotal.toLocaleString()}</div></div>`;
      });

      document.getElementById("confirmItems").innerHTML = html;
      document.getElementById("confirmTotal").textContent = "合計：¥" + total.toLocaleString();

      closeCart();
      document.getElementById("confirmModalBg").style.display = "flex";
    }

    function closeConfirmModal() {
      document.getElementById("confirmModalBg").style.display = "none";
    }

    async function placeOrder() {
      if (cart.length === 0) {
        alert("カートが空です");
        return;
      }

      const rows = cart.map(item => ({
        from_table: item.fromTable,
        target_table: item.orderType === "staff_support" ? null : item.targetTable,
        item_name: item.name,
        item_category: item.category,
        mix: item.mix || null,
        quantity: item.quantity,
        subtotal: item.subtotal,
        order_type: item.orderType,
        support_message: item.supportMessage || null,
        status: "pending"
      }));

      const { error } = await supabase.from("orders").insert(rows);

      if (error) {
        console.error(error);
        alert("注文保存でエラーが出ました");
        return;
      }

      cart = [];
      localStorage.setItem("mocaCart", JSON.stringify(cart));
      closeConfirmModal();
      alert("注文が完了しました");
    }

    async function openHistory() {
      const historyItems = document.getElementById("historyItems");
      historyItems.innerHTML = `<div class="loading-box">読み込み中...</div>`;
      document.getElementById("historyModalBg").style.display = "flex";

      if (loadingHistory) return;
      loadingHistory = true;

      const { data, error } = await supabase
        .from("orders")
        .select("*")
        .eq("from_table", tableNumber)
        .order("created_at", { ascending: false });

      loadingHistory = false;

      if (error) {
        console.error(error);
        historyItems.innerHTML = `<p>注文履歴の取得に失敗しました</p>`;
        return;
      }

      if (!data || data.length === 0) {
        historyItems.innerHTML = `<p>注文履歴はありません</p>`;
        return;
      }

      let html = "";
      data.forEach(item => {
        html += `<div class="history-item"><strong>${escapeHtml(item.item_name)}</strong>`;
        html += `<div class="small-text">${formatDate(item.created_at)}</div>`;
        if (item.mix) html += `<div class="small-text">割り方：${escapeHtml(item.mix)}</div>`;
        html += `<div class="small-text">数量：${item.quantity}</div>`;

        if (item.order_type === "gift") {
          html += `<div class="small-text">Table ${escapeHtml(item.target_table || "")} へ奢り</div>`;
        } else if (item.order_type === "staff_support") {
          html += `<div class="small-text">スタッフ応援</div>`;
          if (item.support_message) html += `<div class="small-text">メッセージ：${escapeHtml(item.support_message)}</div>`;
        } else {
          html += `<div class="small-text">自分のテーブル用</div>`;
        }

        html += `<div class="small-text">小計：¥${Number(item.subtotal).toLocaleString()}</div>`;
        html += `<div class="small-text">状態：${item.status === "done" ? "提供済み" : "未提供"}</div>`;
        html += `</div>`;
      });

      historyItems.innerHTML = html;
    }

    function closeHistory() {
      document.getElementById("historyModalBg").style.display = "none";
    }

    function formatDate(value) {
      try {
        return new Date(value).toLocaleString("ja-JP");
      } catch {
        return value;
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    setupGiftTableOptions();
    renderCategories();
    renderMenu();
  </script>
</body>
</html>
