  <header>
    <h1 class="site-title">Dining Bar <span>moca</span></h1>
    <div class="table-banner" id="tableBanner">Table 1</div>
  </header>

  <div class="top-buttons">
    <button onclick="openCart()">カート</button>
    <button onclick="openHistory()">注文履歴</button>
  </div>

  <div class="category-bar" id="categoryBar"></div>
  <div class="search-wrap">
  <input type="text" id="searchInput" placeholder="商品名で検索" oninput="renderMenu()">
  </div>
  <div class="container">
    <div id="menuArea"></div>
  </div>

  <div class="modal-bg" id="itemModalBg">
    <div class="modal">
      <h2 id="modalTitle"></h2>
      <p id="modalDesc"></p>
      <div class="price" id="modalPrice"></div>

      <div class="option-group" id="drinkOptions">
        <span class="option-title">割り方を選択</span>
        <label><input type="radio" name="mix" value="ロック" checked> ロック</label>
        <label><input type="radio" name="mix" value="ソーダ"> ソーダ</label>
        <label><input type="radio" name="mix" value="水割り"> 水割り</label>
      </div>

      <div class="option-group" id="giftModeWrap">
        <span class="option-title">注文先</span>
        <label><input type="radio" name="giftMode" value="self" checked onchange="toggleGiftTarget()"> 自分のテーブル用</label>
        <label><input type="radio" name="giftMode" value="gift" onchange="toggleGiftTarget()"> 別テーブルに奢る</label>
      </div>

      <div class="option-group" id="giftTargetWrap" style="display:none;">
        <span class="option-title">送り先テーブル</span>
        <select id="giftTarget"></select>
      </div>

      <div class="option-group" id="messageWrap" style="display:none;">
        <span class="option-title">メッセージ</span>
        <textarea id="supportMessage" placeholder="例：接客とても良かったです！"></textarea>
      </div>

      <div class="qty-row">
        <button
          onmousedown="startPress('minus')"
          onmouseup="stopPress()"
          onmouseleave="stopPress()"
          ontouchstart="startPress('minus')"
          ontouchend="stopPress()"
          ontouchcancel="stopPress()"
        >−</button>

        <div class="qty-number" id="qtyNumber">1</div>

        <button
          onmousedown="startPress('plus')"
          onmouseup="stopPress()"
          onmouseleave="stopPress()"
          ontouchstart="startPress('plus')"
          ontouchend="stopPress()"
          ontouchcancel="stopPress()"
        >＋</button>
      </div>

      <div class="modal-actions">
        <button class="btn-sub" onclick="closeItemModal()">閉じる</button>
        <button class="btn-main" onclick="addToCart()">カートに追加</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="optionSelectModalBg">
    <div class="modal">
      <h2 id="optionSelectTitle"></h2>
      <p class="option-modal-note" id="optionSelectDesc"></p>
      <div class="option-btn-list" id="optionSelectButtons"></div>
      <div class="modal-actions">
        <button class="btn-sub" onclick="closeOptionSelectModal()">閉じる</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="cartModalBg">
    <div class="modal">
      <h2>カート</h2>
      <div id="cartItems"></div>
      <div class="total-box" id="cartTotal">合計：¥0</div>
      <div class="modal-actions">
        <button class="btn-sub" onclick="closeCart()">閉じる</button>
        <button class="btn-main" onclick="openConfirmOrder()">注文へ進む</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="confirmModalBg">
    <div class="modal">
      <h2>注文確認</h2>
      <div id="confirmItems"></div>
      <div class="total-box" id="confirmTotal">合計：¥0</div>
      <div class="modal-actions">
        <button class="btn-sub" onclick="closeConfirmModal()">戻る</button>
        <button class="btn-main" onclick="placeOrder()">この内容で注文する</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="historyModalBg">
    <div class="modal">
      <h2>注文履歴</h2>
      <div id="historyItems"></div>
      <div class="modal-actions">
        <button class="btn-main" onclick="closeHistory()">閉じる</button>
      </div>
    </div>
  </div>

    function displayPrice(item) {

    function startPress(type) {
      stopPress();
      pressTimer = setInterval(() => {
        if (type === "plus") changeQty(1);
        else changeQty(-1);
      }, 120);
    }

    function stopPress() {
      if (pressTimer) {
        clearInterval(pressTimer);
        pressTimer = null;
      }
    }

    async function fetchMenuFlags() {
      const { data, error } = await supabaseClient
        .from("menu_flags")
        .select("*");

      if (error) {
        console.error(error);
        return;
      }

      soldOutMap = {};
      (data || []).forEach(row => {
        soldOutMap[row.item_name] = !!row.sold_out;
      });

      renderMenu();
    }

    function subscribeMenuFlags() {
      supabaseClient
        .channel("menu-flags-realtime")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "menu_flags" },
          async () => {
            await fetchMenuFlags();
          }
        )
        .subscribe();
    }

    function setupGiftTableOptions() {
      const select = document.getElementById("giftTarget");
      select.innerHTML = "";
      tableOptions.forEach(num => {
        if (num !== tableNumber) {
          const option = document.createElement("option");
          option.value = num;
          option.textContent = "Table " + num;
          select.appendChild(option);
        }
      });
    }

    function renderCategories() {
      const bar = document.getElementById("categoryBar");
      bar.innerHTML = "";
      categories.forEach(category => {
        const btn = document.createElement("button");
        btn.textContent = category;
        if (category === currentCategory) btn.classList.add("active");
        btn.onclick = () => {
          currentCategory = category;
          renderCategories();
          renderMenu();
        };
        bar.appendChild(btn);
      });
    }

    function isSoldOut(item) {
      if (typeof soldOutMap[item.name] === "boolean") return soldOutMap[item.name];
      return !!item.soldOut;
    }

    function getBadges(item) {
      let html = "";
      if (item.recommend) html += `<span class="badge badge-recommend">おすすめ</span>`;
      if (item.popular) html += `<span class="badge badge-popular">人気</span>`;
      if (item.limited) html += `<span class="badge badge-limited">限定</span>`;
      if (item.selfOnly) html += `<span class="badge badge-selfonly">自席のみ</span>`;
      if (isSoldOut(item)) html += `<span class="badge badge-soldout">SOLD OUT</span>`;
      return html;
    }
    function normalizeSearchText(text) {
  return String(text || "")
    .toLowerCase()
    .normalize("NFKC")
    .replace(/[\u30a1-\u30f6]/g, function(ch) {
      return String.fromCharCode(ch.charCodeAt(0) - 0x60);
    })
    .replace(/ー/g, "")
    .replace(/\s+/g, "");
}

      if (currentCategory === "FOOD") {

      const keyword = normalizeSearchText(document.getElementById("searchInput")?.value || "");

const filtered = items.filter(item => {
  if (!keyword) {
    return item.category === currentCategory;
  }

  const nameText = normalizeSearchText(item.name);
  const descText = normalizeSearchText(item.desc || "");
  const categoryText = normalizeSearchText(item.category);

  return (
    nameText.includes(keyword) ||
    descText.includes(keyword) ||
    categoryText.includes(keyword)
  );
});
      let html = `<div class="menu-grid">`;
      filtered.forEach(item => {
        const idx = items.indexOf(item);
        const soldOut = isSoldOut(item);
        html += `

    function openItemModal(index) {
      selectedItem = items[index];

      if (selectedItem.optionType === "custom_choice" && Array.isArray(selectedItem.options) && selectedItem.options.length > 0) {
        openOptionSelectModal(selectedItem, selectedItem.options, "内容を選択してください");
        return;
      }

      if (selectedItem.optionType === "two_step") {
        currentTwoStepItem = selectedItem;
        currentTwoStepFirstChoice = "";
        openOptionSelectModal(
          selectedItem,
          selectedItem.step1Options || [],
          selectedItem.step1Label || "選択してください"
        );
        return;
      }

      quantity = 1;
      document.getElementById("qtyNumber").textContent = quantity;
      document.getElementById("modalTitle").textContent = selectedItem.name;
      document.getElementById("modalDesc").textContent = selectedItem.desc || "";
      document.getElementById("modalPrice").textContent = displayPrice(selectedItem);

      document.getElementById("drinkOptions").style.display = "none";
      document.getElementById("giftModeWrap").style.display = (selectedItem.support || selectedItem.selfOnly) ? "none" : "block";
      document.getElementById("giftTargetWrap").style.display = "none";
      document.getElementById("messageWrap").style.display = selectedItem.support ? "block" : "none";

      const giftSelf = document.querySelector('input[name="giftMode"][value="self"]');
      if (giftSelf) giftSelf.checked = true;

      document.getElementById("supportMessage").value = "";
      document.getElementById("itemModalBg").style.display = "flex";
    }

    function openOptionSelectModal(item, options, guideText) {
      const title = document.getElementById("optionSelectTitle");
      const desc = document.getElementById("optionSelectDesc");
      const buttons = document.getElementById("optionSelectButtons");

      title.textContent = item.name;
      desc.textContent = guideText || "内容を選択してください";
      buttons.innerHTML = "";

      options.forEach(option => {
        const btn = document.createElement("button");
        btn.textContent = option;
        btn.onclick = () => {
          handleOptionSelection(item, option);
        };
        buttons.appendChild(btn);
      });

      document.getElementById("optionSelectModalBg").style.display = "flex";
    }

    function handleOptionSelection(item, option) {
      if (item.optionType === "custom_choice") {
        openConfiguredItemModal(item, [option]);
        return;
      }

      if (item.optionType === "two_step") {
        if (!currentTwoStepFirstChoice) {
          const hasSecondStep = Array.isArray(item.step2Options) && item.step2Options.length > 0;
          if (!hasSecondStep) {
            openConfiguredItemModal(item, [option]);
            return;
          }

          currentTwoStepFirstChoice = option;
          openOptionSelectModal(
            item,
            item.step2Options,
            item.step2Label || "内容を選択してください"
          );
          return;
        } else {
          const first = currentTwoStepFirstChoice;
          currentTwoStepFirstChoice = "";
          openConfiguredItemModal(item, [first, option]);
          return;
        }
      }
    }

    function openConfiguredItemModal(baseItem, choices) {
      closeOptionSelectModal();

      let label = baseItem.name;
      if (choices && choices.length > 0) {
        label += `（${choices.join(" / ")}）`;
      }

      selectedItem = {
        ...baseItem,
        name: label,
        selectedChoices: choices || []
      };

      quantity = 1;
      document.getElementById("qtyNumber").textContent = quantity;
      document.getElementById("modalTitle").textContent = selectedItem.name;
      document.getElementById("modalDesc").textContent = baseItem.desc || "";
      document.getElementById("modalPrice").textContent = displayPrice(selectedItem);

      document.getElementById("drinkOptions").style.display = "none";
      document.getElementById("giftModeWrap").style.display = (selectedItem.support || selectedItem.selfOnly) ? "none" : "block";
      document.getElementById("giftTargetWrap").style.display = "none";
      document.getElementById("messageWrap").style.display = selectedItem.support ? "block" : "none";

      const giftSelf = document.querySelector('input[name="giftMode"][value="self"]');
      if (giftSelf) giftSelf.checked = true;

      document.getElementById("supportMessage").value = "";
      document.getElementById("itemModalBg").style.display = "flex";
    }

    function closeOptionSelectModal() {
      document.getElementById("optionSelectModalBg").style.display = "none";
      currentTwoStepItem = null;
      currentTwoStepFirstChoice = "";
    }

    function closeItemModal() {
      stopPress();
      document.getElementById("itemModalBg").style.display = "none";
    }

    function toggleGiftTarget() {
      const mode = document.querySelector('input[name="giftMode"]:checked')?.value || "self";
      document.getElementById("giftTargetWrap").style.display = mode === "gift" ? "block" : "none";
    }

    function changeQty(num) {
      quantity += num;
      if (quantity < 1) quantity = 1;
      document.getElementById("qtyNumber").textContent = quantity;
    }

    function addToCart() {
      const supportMessage = selectedItem.support
        ? document.getElementById("supportMessage").value.trim()
        : "";

      const giftMode = selectedItem.support
        ? "staff"
        : selectedItem.selfOnly
          ? "self"
          : (document.querySelector('input[name="giftMode"]:checked')?.value || "self");

      const targetTable = giftMode === "gift"
        ? document.getElementById("giftTarget").value
        : tableNumber;

      const orderType =
        selectedItem.support ? "staff_support" :
        giftMode === "gift" ? "gift" :
        "normal";

      cart.push({
        name: selectedItem.name,
        category: selectedItem.category,
        price: selectedItem.price,
        priceLabel: selectedItem.priceLabel || "",
        desc: selectedItem.desc,
        mix: "",
        quantity,
        subtotal: selectedItem.price * quantity,
        fromTable: tableNumber,
        targetTable,
        isGift: giftMode === "gift",
        support: selectedItem.support || false,
        supportMessage,
        orderType,
        selfOnly: selectedItem.selfOnly || false
      });

      localStorage.setItem("mocaCart", JSON.stringify(cart));
      closeItemModal();
      showToast(selectedItem.support ? "スタッフ応援をカートに追加しました" : "カートに追加しました");
    }

    function openCart() {
      const cartItems = document.getElementById("cartItems");

      if (cart.length === 0) {
        cartItems.innerHTML = `<p>カートは空です</p>`;
        document.getElementById("cartTotal").textContent = "合計：¥0";
      } else {
        let html = "";
        let total = 0;

        cart.forEach(item => {
          total += item.subtotal;
          html += `<div class="cart-item"><strong>${escapeHtml(item.name)}</strong>`;
          html += `<div class="small-text">数量：${item.quantity}</div>`;

          if (item.orderType === "gift") {
            html += `<div class="small-text">届け先：Table ${escapeHtml(item.targetTable)}（Table ${escapeHtml(item.fromTable)} からの奢り）</div>`;
          } else if (item.orderType === "staff_support") {
            html += `<div class="small-text">区分：スタッフ応援</div>`;
            if (item.supportMessage) html += `<div class="small-text">メッセージ：${escapeHtml(item.supportMessage)}</div>`;
          } else {
            html += `<div class="small-text">届け先：Table ${escapeHtml(item.targetTable)}</div>`;
          }

          html += `<div class="small-text">小計：¥${item.subtotal.toLocaleString()}</div></div>`;
        });

        cartItems.innerHTML = html;
        document.getElementById("cartTotal").textContent = "合計：¥" + total.toLocaleString();
      }

      document.getElementById("cartModalBg").style.display = "flex";
    }

    function closeCart() {
      document.getElementById("cartModalBg").style.display = "none";
    }

    function openConfirmOrder() {
      if (cart.length === 0) {
        alert("カートが空です");
        return;
      }

      let html = "";
      let total = 0;

      cart.forEach(item => {
        total += item.subtotal;
        html += `<div class="confirm-item"><strong>${escapeHtml(item.name)}</strong>`;
        html += `<div class="small-text">数量：${item.quantity}</div>`;

        if (item.orderType === "gift") {
          html += `<div class="small-text">届け先：Table ${escapeHtml(item.targetTable)}（Table ${escapeHtml(item.fromTable)} からの奢り）</div>`;
        } else if (item.orderType === "staff_support") {
          html += `<div class="small-text">区分：スタッフ応援</div>`;
          if (item.supportMessage) html += `<div class="small-text">メッセージ：${escapeHtml(item.supportMessage)}</div>`;
        } else {
          html += `<div class="small-text">届け先：Table ${escapeHtml(item.targetTable)}</div>`;
        }

        html += `<div class="small-text">小計：¥${item.subtotal.toLocaleString()}</div></div>`;
      });

      document.getElementById("confirmItems").innerHTML = html;
      document.getElementById("confirmTotal").textContent = "合計：¥" + total.toLocaleString();

      closeCart();
      document.getElementById("confirmModalBg").style.display = "flex";
    }

    function closeConfirmModal() {
      document.getElementById("confirmModalBg").style.display = "none";
    }

    async function placeOrder() {
      if (cart.length === 0) {
        alert("カートが空です");
        return;
      }

      const rows = cart.map(item => ({
        from_table: item.fromTable,
        target_table: item.orderType === "staff_support" ? null : item.targetTable,
        item_name: item.name,
        item_category: item.category,
        mix: null,
        quantity: item.quantity,
        subtotal: item.subtotal,
        order_type: item.orderType,
        support_message: item.supportMessage || null,
        status: "pending"
      }));

      const { error } = await supabaseClient.from("orders").insert(rows);

      if (error) {
        console.error(error);
        alert("注文保存でエラーが出ました");
        return;
      }

      cart = [];
      localStorage.setItem("mocaCart", JSON.stringify(cart));
      closeConfirmModal();
      showToast("ご注文ありがとうございます");
    }

    async function openHistory() {
      const historyItems = document.getElementById("historyItems");
      historyItems.innerHTML = `<div class="loading-box">読み込み中...</div>`;
      document.getElementById("historyModalBg").style.display = "flex";

      if (loadingHistory) return;
      loadingHistory = true;

      const { data, error } = await supabaseClient
        .from("orders")
        .select("*")
        .eq("from_table", tableNumber)
        .order("created_at", { ascending: false });

      loadingHistory = false;

      if (error) {
        console.error(error);
        historyItems.innerHTML = `<p>注文履歴の取得に失敗しました</p>`;
        return;
      }

      if (!data || data.length === 0) {
        historyItems.innerHTML = `<p>注文履歴はありません</p>`;
        return;
      }

      let html = "";
      data.forEach(item => {
        html += `<div class="history-item"><strong>${escapeHtml(item.item_name)}</strong>`;
        html += `<div class="small-text">${formatDate(item.created_at)}</div>`;
        html += `<div class="small-text">数量：${item.quantity}</div>`;

        if (item.order_type === "gift") {
          html += `<div class="small-text">Table ${escapeHtml(item.target_table || "")} へ奢り</div>`;
        } else if (item.order_type === "staff_support") {
          html += `<div class="small-text">スタッフ応援</div>`;
          if (item.support_message) html += `<div class="small-text">メッセージ：${escapeHtml(item.support_message)}</div>`;
        } else {
          html += `<div class="small-text">自分のテーブル用</div>`;
        }

        html += `<div class="small-text">小計：¥${Number(item.subtotal).toLocaleString()}</div>`;
        html += `<div class="small-text">状態：${item.status === "done" ? "提供済み" : "未提供"}</div>`;
        html += `</div>`;
      });

      historyItems.innerHTML = html;
    }

    function closeHistory() {
      document.getElementById("historyModalBg").style.display = "none";
    }

    function formatDate(value) {
      try {
        return new Date(value).toLocaleString("ja-JP");
      } catch {
        return value;
      }
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showToast(msg) {
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 1800);
    }

    setupGiftTableOptions();
    renderCategories();
    renderMenu();
    fetchMenuFlags();
    subscribeMenuFlags();
  </script>
</body>
</html>
